<style>

<body>

<div class="container">
  <div class="header">
    <h1>LLM Model Explorer</h1>
    <div class="header-right">
      <div class="stats-bar" id="stats-bar"></div>
      <button class="theme-toggle" id="theme-toggle">Light</button>
    </div>
  </div>

  <div class="controls" id="controls">
    <input type="text" class="search-box" id="search" placeholder="Search models or creators...">
    <div class="filter-group">
      <label>Reasoning:</label>
      <select class="filter-select" id="reasoning-filter">
        <option value="">All</option>
        <option value="any">Any reasoning</option>
        <option value="basic">Basic</option>
        <option value="advanced">Advanced</option>
        <option value="frontier">Frontier</option>
      </select>
    </div>
    <label class="filter-checkbox"><input type="checkbox" id="open-only"> Open-weight only</label>
    <label class="filter-checkbox"><input type="checkbox" id="has-free-tier"> Has free tier</label>
    <div class="price-slider-group">
      <label>Max input $/1M:</label>
      <input type="range" class="price-slider" id="price-slider" min="0" max="100" value="100" step="1">
      <span class="price-val" id="price-val">any</span>
    </div>
  </div>

  <div class="source-badges" id="source-badges"></div>
  <div class="creator-badges" id="creator-badges"></div>
  <div class="col-groups" id="col-groups"></div>

  <div class="table-wrapper" id="table-wrapper">
    <div class="loading"><div class="spinner"></div><br>Loading model data...</div>
  </div>

  <div class="footer">
    Data merged from Artificial Analysis, HuggingFace OpenEvals, Vantage, and Bifrost.
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let allModels = [];
let sortCol = 'name';
let sortDir = 'asc';
let expandedId = null;
let activeCreators = new Set();
let activeSources = new Set(['aa','hf','vantage','bifrost']);

const CREATOR_COLORS = {
  openai:'#74d680', anthropic:'#d4a06a', google:'#ea4c89', meta:'#a78bfa',
  mistral:'#f7a74a', deepseek:'#34d399', alibaba:'#5dadec', xai:'#f472b6',
  cohere:'#818cf8', amazon:'#fb923c', nvidia:'#a3e635', microsoft:'#60a5fa',
  ibm:'#c084fc', samsung:'#38bdf8', together:'#4ade80', fireworks:'#f97316',
  groq:'#22d3ee', perplexity:'#e879f9', databricks:'#facc15', writer:'#a78bfa'
};

// ── Column groups ──────────────────────────────────────────────
const COL_GROUPS = {
  Identity: [
    {key:'name', label:'Model', fmt:'name'},
    {key:'creator', label:'Creator', fmt:'creator'},
    {key:'release_date', label:'Released', fmt:'text'},
    {key:'model_type', label:'Type', fmt:'text'},
  ],
  Metadata: [
    {key:'parameters_billions', label:'Params (B)', fmt:'num1'},
    {key:'reasoning_tier', label:'Reasoning', fmt:'text'},
    {key:'selfhostable', label:'Selfhost', fmt:'bool'},
    {key:'context_window', label:'Context', fmt:'tokens'},
  ],
  Pricing: [
    {key:'input_price_per_1m', label:'Input $/1M', fmt:'price'},
    {key:'output_price_per_1m', label:'Output $/1M', fmt:'price'},
    {key:'min_input_price_per_1m', label:'Min In', fmt:'price'},
    {key:'max_input_price_per_1m', label:'Max In', fmt:'price'},
    {key:'blended_price_per_1m', label:'Blended $/1M', fmt:'price'},
    {key:'num_providers', label:'Providers', fmt:'int'},
    {key:'num_free_providers', label:'# Free', fmt:'int'},
    {key:'has_batch_pricing', label:'Batch', fmt:'bool'},
  ],
  Performance: [
    {key:'output_tokens_per_sec', label:'Tok/s', fmt:'num1'},
    {key:'time_to_first_token_s', label:'TTFT (s)', fmt:'num2'},
    {key:'time_to_first_answer_s', label:'TTFA (s)', fmt:'num2'},
  ],
  Capabilities: [
    {key:'supports_vision', label:'Vision', fmt:'bool'},
    {key:'supports_reasoning', label:'Reasoning', fmt:'bool'},
    {key:'supports_function_calling', label:'Fn Call', fmt:'bool'},
    {key:'supports_web_search', label:'Web', fmt:'bool'},
    {key:'supports_prompt_caching', label:'Cache', fmt:'bool'},
    {key:'supports_pdf_input', label:'PDF', fmt:'bool'},
  ],
  Benchmarks: [
    {key:'benchmarks.aa_intelligence_index', label:'AA Intel', fmt:'bench'},
    {key:'benchmarks.aa_coding_index', label:'AA Code', fmt:'bench'},
    {key:'benchmarks.gpqa', label:'GPQA', fmt:'pct'},
    {key:'benchmarks.hle', label:'HLE', fmt:'pct'},
    {key:'benchmarks.livecodebench', label:'LCB', fmt:'pct'},
    {key:'benchmarks.mmlu_pro', label:'MMLU-Pro', fmt:'pct'},
    {key:'benchmarks.aime_2025', label:'AIME 25', fmt:'pct'},
    {key:'benchmarks.math_500', label:'MATH', fmt:'pct'},
    {key:'benchmarks.swe_bench_verified', label:'SWE', fmt:'pct'},
    {key:'benchmarks.terminalbench_hard', label:'TBench', fmt:'pct'},
  ],
  'Cost Eff.': [
    {key:'swe_bench_cost_per_resolved', label:'SWE $/fix', fmt:'price'},
    {key:'skatebench_cost_per_test', label:'Skate $/test', fmt:'price'},
    {key:'hf_aggregate_score', label:'HF Agg', fmt:'num1'},
  ],
};

let activeGroups = new Set(['Identity','Pricing','Performance']);

// ── Helpers ────────────────────────────────────────────────────
function getVal(obj, path) {
  const parts = path.split('.');
  let v = obj;
  for (const p of parts) { v = v?.[p]; }
  return v;
}

function fmtVal(val, fmt) {
  if (val === null || val === undefined || (typeof val === 'number' && isNaN(val)))
    return {html:'<span class="null-val">\u2014</span>', cls:'null-val', raw:null};
  switch(fmt) {
    case 'name': return {html:esc(val), cls:'name-cell', raw:val};
    case 'creator': return {html:esc(val), cls:'creator-cell', raw:val};
    case 'text': return {html:esc(String(val)), cls:'', raw:val};
    case 'int': return {html:String(val), cls:'', raw:val};
    case 'num1': return {html:Number(val).toFixed(1), cls:'', raw:val};
    case 'num2': return {html:Number(val).toFixed(2), cls:'', raw:val};
    case 'price': return {html:'$'+fmtPrice(val), cls:'', raw:val};
    case 'pct': return {html:(Number(val)*100).toFixed(1)+'%', cls:'', raw:val};
    case 'bench': return {html:Number(val).toFixed(1), cls:'', raw:val};
    case 'tokens': return {html:fmtTokens(val), cls:'', raw:val};
    case 'bool':
      if (val === true) return {html:'\u2713', cls:'bool-true', raw:1};
      return {html:'\u2715', cls:'bool-false', raw:0};
    default: return {html:esc(String(val)), cls:'', raw:val};
  }
}

function fmtPrice(v) {
  if (v === null || v === undefined) return '\u2014';
  if (v >= 100) return Number(v).toFixed(0);
  if (v >= 1) return Number(v).toFixed(2);
  if (v >= 0.01) return Number(v).toFixed(3);
  return Number(v).toFixed(4);
}

function fmtTokens(v) {
  if (!v) return '\u2014';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Heatmap for benchmarks (higher = greener)
function benchColor(val, min, max) {
  if (val === null || val === undefined) return '';
  const t = Math.max(0, Math.min(1, (val - min) / (max - min || 1)));
  const isDark = document.documentElement.dataset.theme === 'dark';
  if (isDark) {
    const r = Math.round(26 + t * 0);
    const g = Math.round(35 + t * 50);
    const b = Math.round(50 - t * 18);
    return `background:rgb(${r},${g},${b})`;
  } else {
    const r = Math.round(240 - t * 112);
    const g = Math.round(244 - t * 20);
    const b = Math.round(248 - t * 120);
    return `background:rgb(${r},${g},${b})`;
  }
}

// Heatmap for prices (lower = greener)
function priceColor(val, min, max) {
  if (val === null || val === undefined) return '';
  const t = Math.max(0, Math.min(1, (val - min) / (max - min || 1)));
  const isDark = document.documentElement.dataset.theme === 'dark';
  if (isDark) {
    const r = Math.round(26 + t * 32);
    const g = Math.round(58 - t * 32);
    const b = Math.round(42 - t * 16);
    return `background:rgb(${r},${g},${b})`;
  } else {
    const r = Math.round(208 + t * 32);
    const g = Math.round(240 - t * 32);
    const b = Math.round(208);
    return `background:rgb(${r},${g},${b})`;
  }
}

// ── Compute column stats for heatmaps ──────────────────────────
let colStats = {};
function computeStats(models) {
  colStats = {};
  for (const [gName, cols] of Object.entries(COL_GROUPS)) {
    for (const col of cols) {
      if (!['price','pct','bench','num1'].includes(col.fmt)) continue;
      const vals = models.map(m => getVal(m, col.key)).filter(v => v !== null && v !== undefined && !isNaN(v));
      if (vals.length > 0) {
        colStats[col.key] = {min: Math.min(...vals), max: Math.max(...vals)};
      }
    }
  }
}

// ── Filtering ──────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const reasoningFilter = document.getElementById('reasoning-filter').value;
  const openOnly = document.getElementById('open-only').checked;
  const hasFreeTier = document.getElementById('has-free-tier').checked;
  const maxPrice = parseInt(document.getElementById('price-slider').value);
  const priceLimit = maxPrice >= 100 ? Infinity : maxPrice;

  return allModels.filter(m => {
    // Text search
    if (q && !m.name.toLowerCase().includes(q) && !m.creator.toLowerCase().includes(q)) return false;
    // Creator filter
    if (activeCreators.size > 0 && !activeCreators.has(m.creator)) return false;
    // Source filter
    if (activeSources.size < 4) {
      if (!m.sources.some(s => activeSources.has(s))) return false;
    }
    // Reasoning filter
    if (reasoningFilter === 'any' && !m.reasoning) return false;
    if (reasoningFilter && reasoningFilter !== 'any' && m.reasoning_tier !== reasoningFilter) return false;
    // Open-weight only
    if (openOnly && m.model_type !== 'open') return false;
    // Has free tier
    if (hasFreeTier && !m.has_free_tier) return false;
    // Price filter
    if (priceLimit < Infinity && (m.input_price_per_1m === null || m.input_price_per_1m > priceLimit)) return false;
    return true;
  });
}

// ── Sort ───────────────────────────────────────────────────────
function sortModels(models) {
  return [...models].sort((a, b) => {
    let va = getVal(a, sortCol);
    let vb = getVal(b, sortCol);
    // Nulls always last
    if (va === null || va === undefined) return 1;
    if (vb === null || vb === undefined) return -1;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

// ── Get visible columns ────────────────────────────────────────
function getVisibleCols() {
  const cols = [];
  for (const [gName, gcols] of Object.entries(COL_GROUPS)) {
    if (activeGroups.has(gName)) cols.push(...gcols);
  }
  return cols;
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const sorted = sortModels(filtered);
  const cols = getVisibleCols();

  computeStats(filtered);

  // Stats bar
  document.getElementById('stats-bar').textContent =
    `${sorted.length} / ${allModels.length} models`;

  const wrapper = document.getElementById('table-wrapper');

  let html = '<table><thead><tr>';
  for (const col of cols) {
    const isSorted = sortCol === col.key;
    const arrow = isSorted ? (sortDir === 'asc' ? '\u25B2' : '\u25BC') : '\u25B4';
    html += `<th class="${isSorted?'sorted':''}" data-col="${col.key}">`;
    html += `${esc(col.label)} <span class="sort-arrow">${arrow}</span></th>`;
  }
  html += '</tr></thead><tbody>';

  for (const m of sorted) {
    const isExpanded = expandedId === m.id;
    html += `<tr class="model-row ${isExpanded?'expanded':''}" data-id="${esc(m.id)}">`;
    for (const col of cols) {
      const val = getVal(m, col.key);
      const f = fmtVal(val, col.fmt);
      let style = '';
      const stats = colStats[col.key];
      if (stats && f.raw !== null) {
        if (col.fmt === 'price') {
          style = priceColor(f.raw, stats.min, stats.max);
        } else if (['pct','bench','num1'].includes(col.fmt) && col.key.startsWith('benchmarks.')) {
          style = benchColor(f.raw, stats.min, stats.max);
        }
      }
      html += `<td class="${f.cls}" ${style?'style="'+style+'"':''}>${f.html}</td>`;
    }
    html += '</tr>';

    if (isExpanded) {
      html += `<tr class="detail-row"><td colspan="${cols.length}">`;
      html += renderDetail(m);
      html += '</td></tr>';
    }
  }

  html += '</tbody></table>';
  wrapper.innerHTML = html;

  // Bind events
  wrapper.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'asc';
      }
      render();
    });
  });

  wrapper.querySelectorAll('.model-row').forEach(tr => {
    tr.addEventListener('click', () => {
      const id = tr.dataset.id;
      expandedId = expandedId === id ? null : id;
      render();
    });
  });
}

// ── Detail panel ───────────────────────────────────────────────
function renderDetail(m) {
  let html = '<div class="detail-content">';

  // Identity section
  html += '<div class="detail-section"><h3>Model Info</h3><div class="detail-grid">';
  const infoFields = [
    ['Name', m.name], ['Creator', m.creator], ['Country', m.creator_country],
    ['Released', m.release_date], ['Type', m.model_type],
    ['Parameters', m.parameters_billions ? m.parameters_billions+'B' : null],
    ['Architecture', m.architecture], ['License', m.license],
    ['Context Window', fmtTokens(m.context_window)],
    ['Max Output', fmtTokens(m.max_output_tokens)],
    ['Reasoning Tier', m.reasoning_tier],
    ['Selfhostable', m.selfhostable === true ? 'Yes' : m.selfhostable === false ? 'No' : null],
    ['Sources', m.sources?.join(', ')],
  ];
  for (const [label, val] of infoFields) {
    const display = val || '\u2014';
    html += `<span class="label">${esc(label)}</span><span class="value">${esc(String(display))}</span>`;
  }
  html += '</div></div>';

  // Benchmarks section
  const bench = m.benchmarks || {};
  const benchEntries = Object.entries(bench).filter(([k,v]) => v !== null && v !== undefined);
  if (benchEntries.length > 0) {
    html += '<div class="detail-section"><h3>Benchmarks</h3><div class="detail-grid">';
    for (const [k, v] of benchEntries) {
      const label = k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      const display = typeof v === 'number' ? (v < 1 && v > 0 ? (v*100).toFixed(1)+'%' : v.toFixed(2)) : v;
      html += `<span class="label">${esc(label)}</span><span class="value">${esc(String(display))}</span>`;
    }
    html += '</div></div>';
  }

  // Performance section
  if (m.output_tokens_per_sec || m.time_to_first_token_s) {
    html += '<div class="detail-section"><h3>Performance</h3><div class="detail-grid">';
    const perfFields = [
      ['Output tok/s', m.output_tokens_per_sec?.toFixed(1)],
      ['TTFT', m.time_to_first_token_s ? m.time_to_first_token_s.toFixed(2)+'s' : null],
      ['TTFA', m.time_to_first_answer_s ? m.time_to_first_answer_s.toFixed(2)+'s' : null],
    ];
    for (const [label, val] of perfFields) {
      html += `<span class="label">${esc(label)}</span><span class="value">${esc(val||'\u2014')}</span>`;
    }
    html += '</div></div>';
  }

  // Capabilities section
  const caps = [
    ['Vision', m.supports_vision], ['Function Calling', m.supports_function_calling],
    ['Web Search', m.supports_web_search], ['PDF Input', m.supports_pdf_input],
    ['Audio In', m.supports_audio_input], ['Audio Out', m.supports_audio_output],
    ['Video In', m.supports_video_input], ['Prompt Caching', m.supports_prompt_caching],
    ['Computer Use', m.supports_computer_use],
  ].filter(([_,v]) => v !== null && v !== undefined);
  if (caps.length > 0) {
    html += '<div class="detail-section"><h3>Capabilities</h3><div class="detail-grid">';
    for (const [label, val] of caps) {
      const icon = val ? '\u2713' : '\u2715';
      const color = val ? 'var(--color-success)' : 'var(--color-text-dim)';
      html += `<span class="label">${esc(label)}</span><span class="value" style="color:${color}">${icon}</span>`;
    }
    if (m.supported_modalities?.length) {
      html += `<span class="label">Modalities</span><span class="value">${esc(m.supported_modalities.join(', '))}</span>`;
    }
    html += '</div></div>';
  }

  // Provider pricing (from Bifrost) — enhanced comparison table
  if (m.provider_pricing?.length > 0) {
    const pp = m.provider_pricing;
    const hasBatch = pp.some(p => p.batch_input_price_per_1m != null);
    const hasPriority = pp.some(p => p.priority_input_price_per_1m != null);
    const hasFlex = pp.some(p => p.flex_input_price_per_1m != null);
    const hasReasoning = pp.some(p => p.reasoning_output_price_per_1m != null);
    const hasRPM = pp.some(p => p.rpm != null);
    const hasTPM = pp.some(p => p.tpm != null);

    // Sort: free first, then cheapest paid
    const sorted = [...pp].sort((a, b) => {
      if (a.is_free && !b.is_free) return -1;
      if (!a.is_free && b.is_free) return 1;
      const ap = a.input_price_per_1m ?? Infinity;
      const bp = b.input_price_per_1m ?? Infinity;
      return ap - bp;
    });

    // Find cheapest paid provider
    const cheapestPaid = sorted.find(p => !p.is_free && p.input_price_per_1m > 0);

    // Self-hosted providers
    const selfHosted = new Set(['ollama', 'lemonade', 'sagemaker']);

    html += '<div class="detail-section" style="grid-column:1/-1"><h3>Provider Pricing Comparison (per 1M tokens)</h3>';
    html += '<table class="pricing-table"><thead><tr>';
    html += '<th>Provider</th><th>Input</th><th>Output</th>';
    if (hasBatch) html += '<th>Batch In</th><th>Batch Out</th>';
    if (hasPriority) html += '<th>Priority In</th><th>Priority Out</th>';
    if (hasFlex) html += '<th>Flex In</th><th>Flex Out</th>';
    if (hasReasoning) html += '<th>Reasoning Out</th>';
    if (hasRPM) html += '<th>RPM</th>';
    if (hasTPM) html += '<th>TPM</th>';
    html += '<th>Tier</th>';
    html += '</tr></thead><tbody>';

    const totalCols = 3 + (hasBatch?2:0) + (hasPriority?2:0) + (hasFlex?2:0) + (hasReasoning?1:0) + (hasRPM?1:0) + (hasTPM?1:0) + 1;

    for (const p of sorted.slice(0, 25)) {
      const isCheapest = cheapestPaid && p === cheapestPaid;
      const rowClass = p.is_free ? 'free-row' : (isCheapest ? 'cheapest-row' : '');
      html += `<tr class="${rowClass}">`;

      // Provider name with badges
      let provLabel = esc(p.provider);
      if (p.is_free) provLabel = '<span class="tier-badge badge-free">FREE</span> ' + provLabel;
      if (isCheapest) provLabel = '<span class="badge-cheapest">\u2605</span> ' + provLabel;
      html += `<td style="font-family:var(--font-body)">${provLabel}</td>`;

      // Standard pricing
      if (p.is_free) {
        html += '<td style="color:var(--color-success)">FREE</td>';
        html += '<td style="color:var(--color-success)">FREE</td>';
      } else {
        html += `<td>${p.input_price_per_1m != null ? '$'+fmtPrice(p.input_price_per_1m) : '\u2014'}</td>`;
        html += `<td>${p.output_price_per_1m != null ? '$'+fmtPrice(p.output_price_per_1m) : '\u2014'}</td>`;
      }

      // Batch
      if (hasBatch) {
        html += `<td>${p.batch_input_price_per_1m != null ? '$'+fmtPrice(p.batch_input_price_per_1m) : '\u2014'}</td>`;
        html += `<td>${p.batch_output_price_per_1m != null ? '$'+fmtPrice(p.batch_output_price_per_1m) : '\u2014'}</td>`;
      }
      // Priority
      if (hasPriority) {
        html += `<td>${p.priority_input_price_per_1m != null ? '$'+fmtPrice(p.priority_input_price_per_1m) : '\u2014'}</td>`;
        html += `<td>${p.priority_output_price_per_1m != null ? '$'+fmtPrice(p.priority_output_price_per_1m) : '\u2014'}</td>`;
      }
      // Flex
      if (hasFlex) {
        html += `<td>${p.flex_input_price_per_1m != null ? '$'+fmtPrice(p.flex_input_price_per_1m) : '\u2014'}</td>`;
        html += `<td>${p.flex_output_price_per_1m != null ? '$'+fmtPrice(p.flex_output_price_per_1m) : '\u2014'}</td>`;
      }
      // Reasoning
      if (hasReasoning) {
        html += `<td>${p.reasoning_output_price_per_1m != null ? '$'+fmtPrice(p.reasoning_output_price_per_1m) : '\u2014'}</td>`;
      }
      // RPM
      if (hasRPM) {
        html += `<td>${p.rpm != null ? p.rpm.toLocaleString() : '\u2014'}</td>`;
      }
      // TPM
      if (hasTPM) {
        html += `<td>${p.tpm != null ? p.tpm.toLocaleString() : '\u2014'}</td>`;
      }

      // Tier label
      let tier = 'std';
      if (p.is_free) {
        tier = selfHosted.has(p.provider) ? 'self-hosted' : 'free';
      }
      html += `<td style="font-family:var(--font-body);font-size:10px;color:var(--color-text-muted)">${tier}</td>`;
      html += '</tr>';
    }

    if (sorted.length > 25) {
      html += `<tr><td colspan="${totalCols}" style="color:var(--color-text-muted)">\u2026 and ${sorted.length - 25} more providers</td></tr>`;
    }
    html += '</tbody></table>';

    // Legend
    html += '<div class="pricing-legend">';
    html += '<span class="badge-cheapest">\u2605</span> = cheapest paid option';
    if (pp.some(p => p.is_free)) html += ' &nbsp;\u00B7&nbsp; <span class="tier-badge badge-free">FREE</span> = $0 pricing (may have rate limits or restrictions)';
    html += '</div>';
    html += '</div>';
  }

  // Vendor pricing (from Vantage)
  if (m.vendor_pricing?.length > 0) {
    html += '<div class="detail-section"><h3>Cloud Vendor Pricing (per 1M tokens)</h3>';
    html += '<table class="pricing-table"><thead><tr><th>Vendor</th><th>Input</th><th>Output</th></tr></thead><tbody>';
    for (const v of m.vendor_pricing) {
      html += `<tr><td>${esc(v.vendor)}</td>`;
      html += `<td>${v.input_price_per_1m !== null ? '$'+fmtPrice(v.input_price_per_1m) : '\u2014'}</td>`;
      html += `<td>${v.output_price_per_1m !== null ? '$'+fmtPrice(v.output_price_per_1m) : '\u2014'}</td>`;
      html += '</tr>';
    }
    html += '</tbody></table></div>';
  }

  html += '</div>';
  return html;
}

// ── Setup UI ───────────────────────────────────────────────────
function setupUI() {
  // Theme toggle
  const toggle = document.getElementById('theme-toggle');
  toggle.addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    toggle.textContent = isDark ? 'Dark' : 'Light';
    render();
  });

  // Column group buttons
  const groupsEl = document.getElementById('col-groups');
  for (const gName of Object.keys(COL_GROUPS)) {
    const btn = document.createElement('button');
    btn.className = 'col-group-btn' + (activeGroups.has(gName) ? ' active' : '');
    btn.textContent = gName;
    btn.addEventListener('click', () => {
      if (activeGroups.has(gName)) activeGroups.delete(gName);
      else activeGroups.add(gName);
      btn.classList.toggle('active');
      render();
    });
    groupsEl.appendChild(btn);
  }

  // Source badges
  const srcEl = document.getElementById('source-badges');
  for (const src of ['aa','hf','vantage','bifrost']) {
    const badge = document.createElement('span');
    badge.className = 'source-badge active';
    badge.textContent = src;
    badge.addEventListener('click', () => {
      if (activeSources.has(src)) activeSources.delete(src);
      else activeSources.add(src);
      badge.classList.toggle('active');
      render();
    });
    srcEl.appendChild(badge);
  }

  // Creator badges
  const creatorCounts = {};
  for (const m of allModels) {
    creatorCounts[m.creator] = (creatorCounts[m.creator] || 0) + 1;
  }
  const topCreators = Object.entries(creatorCounts)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 20)
    .map(([name]) => name);

  const badgesEl = document.getElementById('creator-badges');
  for (const creator of topCreators) {
    const badge = document.createElement('span');
    badge.className = 'creator-badge';
    badge.textContent = creator;
    const color = CREATOR_COLORS[creator];
    if (color) badge.style.borderColor = color;
    badge.addEventListener('click', () => {
      if (activeCreators.has(creator)) {
        activeCreators.delete(creator);
        badge.classList.remove('active');
        if (color) { badge.style.background = ''; badge.style.color = ''; }
      } else {
        activeCreators.add(creator);
        badge.classList.add('active');
        if (color) { badge.style.background = color; badge.style.color = '#111'; }
      }
      render();
    });
    badgesEl.appendChild(badge);
  }

  // Search + filters
  document.getElementById('search').addEventListener('input', debounce(render, 150));
  document.getElementById('reasoning-filter').addEventListener('change', render);
  document.getElementById('open-only').addEventListener('change', render);
  document.getElementById('has-free-tier').addEventListener('change', render);

  const slider = document.getElementById('price-slider');
  const priceVal = document.getElementById('price-val');
  slider.addEventListener('input', () => {
    const v = parseInt(slider.value);
    priceVal.textContent = v >= 100 ? 'any' : '$'+v;
    render();
  });
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// ── Init ───────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('../data/merged_models.json');
    if (!resp.ok) throw new Error('Failed to load data: ' + resp.status);
    const data = await resp.json();
    allModels = data.models || [];
    setupUI();
    render();
  } catch(e) {
    document.getElementById('table-wrapper').innerHTML =
      `<div class="error-msg">Error loading data: ${esc(e.message)}<br><br>Make sure merged_models.json exists in the data/ directory.</div>`;
  }
}

init();
</script>
